<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantina Coral Louvor Vida</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background: #0f172a; color: white; }
.card { transition: 0.3s; }
.card:hover { transform: scale(1.02); }
</style>
</head>

<body class="p-4">

<h1 class="text-3xl font-bold text-center mb-4">
🍽️ Cantina Coral Louvor Vida
</h1>

<p class="text-center mb-6 text-gray-300">
Escolha um item e faça sua doação ❤️
</p>

<!-- CONTADORES -->
<div class="flex justify-center gap-6 mb-6">
<div>Disponíveis: <span id="disponiveis">0</span></div>
<div>Doados: <span id="doados">0</span></div>
<div>Total: <span id="total">0</span></div>
</div>

<!-- LISTA -->
<div id="lista" class="grid md:grid-cols-3 gap-4"></div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center">
<div class="bg-white text-black p-6 rounded w-80">
<h2 id="modalTitulo" class="text-lg font-bold mb-4"></h2>

<input id="nomeDoador" placeholder="Seu nome"
class="w-full border p-2 mb-4">

<div class="flex justify-end gap-2">
<button onclick="fecharModal()" class="bg-gray-400 px-3 py-1 rounded">Cancelar</button>
<button onclick="confirmarDoacao()" class="bg-green-600 text-white px-3 py-1 rounded">Confirmar</button>
</div>
</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
  projectId: "SEU_PROJETO"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ITENS (mantendo duplicados)
const baseItens = [
{ id:1, nome:"1kg de filé de frango"},
{ id:2, nome:"1kg de filé de frango"},
{ id:3, nome:"1kg de filé de frango"},
{ id:4, nome:"1kg Farinha de trigo (Rosa Branca)"},
{ id:5, nome:"1kg Farinha de trigo (Rosa Branca)"},
{ id:6, nome:"1kg Farinha de trigo (Rosa Branca)"},
{ id:7, nome:"1 pote 500 gramas Margarina (Delícia)"},
{ id:8, nome:"1 pote 500 gramas Margarina (Delícia)"},
{ id:9, nome:"1 pote 500 gramas Margarina (Delícia)"},
{ id:10, nome:"1 garrafa 200ml Guaraná pitula(Antártica)"},
{ id:11, nome:"1 garrafa 200ml Guaraná pitula(Antártica)"},
{ id:12, nome:"1 garrafa 200ml Guaraná pitula(Antártica)"},
{ id:13, nome:"3 sachês de molho tomate 250ml(Promessa) + 2 cheiros-verde"},
{ id:14, nome:"3 Cebolas + 100 gramas de lemon pepper"}
];

let itens = [];
let itemSelecionado = null;

function iniciarItens() {
  itens = baseItens.map(i => ({
    ...i,
    disponivel: true,
    doadoPor: null
  }));
}

// 🔥 TEMPO REAL
db.ref("doacoes").on("value", snapshot => {
  const dados = snapshot.val() || {};

  iniciarItens();

  Object.keys(dados).forEach(id => {
    let item = itens.find(i => i.id == id);
    if (item) {
      item.disponivel = false;
      item.doadoPor = dados[id].nome;
    }
  });

  renderizar();
  atualizarContadores();
});

// RENDER
function renderizar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  itens.forEach(item => {
    const div = document.createElement("div");

    div.className = `card p-4 rounded ${
      item.disponivel ? "bg-blue-600" : "bg-gray-600"
    }`;

    div.innerHTML = `
      <h3 class="font-bold">${item.nome}</h3>
      <p class="text-sm">
        ${item.disponivel ? "Disponível" : "Doado por " + item.doadoPor}
      </p>
      <button
        class="mt-2 px-3 py-1 rounded ${
          item.disponivel ? "bg-green-500" : "bg-gray-400"
        }"
        ${!item.disponivel ? "disabled" : ""}
        onclick="abrirModal(${item.id})"
      >
        Doar
      </button>
    `;

    lista.appendChild(div);
  });
}

// MODAL
function abrirModal(id) {
  itemSelecionado = itens.find(i => i.id === id);
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modalTitulo").innerText = itemSelecionado.nome;
}

function fecharModal() {
  document.getElementById("modal").classList.add("hidden");
}

// DOAR
function confirmarDoacao() {
  const nome = document.getElementById("nomeDoador").value;

  if (!nome) {
    alert("Digite seu nome");
    return;
  }

  db.ref("doacoes/" + itemSelecionado.id).set({
    nome: nome
  });

  fecharModal();
}

// CONTADORES
function atualizarContadores() {
  document.getElementById("disponiveis").innerText =
    itens.filter(i => i.disponivel).length;

  document.getElementById("doados").innerText =
    itens.filter(i => !i.disponivel).length;

  document.getElementById("total").innerText = itens.length;
}

// RESET (opcional)
function resetar() {
  db.ref("doacoes").remove();
}

// START
iniciarItens();
renderizar();
atualizarContadores();
</script>

</body>
</html>
